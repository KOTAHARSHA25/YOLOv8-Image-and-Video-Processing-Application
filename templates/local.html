<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Media | NexVision AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>

<body>
  <div class="glass-orb top-left"></div>
  <div class="glass-orb bottom-right"></div>

  <div class="container my-5 content-wrapper">
    <div class="glass-card text-center mb-5">
      <h1 class="font-orbitron text-primary-cyan mb-2">LOCAL MEDIA ANALYSIS</h1>
      <p class="lead text-light mb-0">Drag and drop images or videos for advanced YOLOv8 inference.</p>
      <a href="/" class="btn btn-outline-cyan mt-3 btn-sm">&larr; Back to Dashboard</a>
    </div>

    <!-- UI State Manager -->
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="glass-card">
          
          <!-- STATE 1: Upload Form -->
          <div id="upload-state">
            <form id="upload-form" class="upl-container">
              <div class="upload-area mb-4" id="upload-dropzone">
                <input type="file" onChange="handleFileSelect(event)" name="myfile" id="myfile" accept="image/*, video/*">
                <label for="myfile" class="upload-label text-light">
                  <span class="d-block mb-2" style="font-size: 2rem;">📁</span>
                  <span id="file-name-display">Drag and drop or click to select a file</span>
                </label>
              </div>

              <div class="mb-4">
                <label for="modelSelect" class="form-label text-info font-orbitron">Neural Network Task:</label>
                <select class="form-select bg-dark text-light border-secondary" id="modelSelect" name="model_type">
                  <option value="Detection">YOLOv8 Object Detection</option>
                  <option value="Segmentation">YOLOv8 Instance Segmentation</option>
                  <option value="Pose Estimation">YOLOv8 Human Pose Estimation</option>
                </select>
              </div>

              <div class="d-grid">
                <button type="button" id="process-btn" class="btn btn-cyan btn-lg font-orbitron" style="display: none;" onclick="submitAJAX()">INITIALIZE PROCESSING</button>
              </div>
            </form>
          </div>

          <!-- STATE 2: Loading / Processing -->
          <div id="processing-state" class="text-center py-5" style="display: none;">
            <div class="spinner-border text-info mb-3" role="status" style="width: 3rem; height: 3rem;">
              <span class="visually-hidden">Loading...</span>
            </div>
            <h4 class="font-orbitron text-light">Transferring to Render Cluster...</h4>
            <p class="text-muted">Uploading file and warming up selected model. Please wait.</p>
          </div>

          <!-- STATE 3: Stream Output -->
          <div id="result-state" class="text-center" style="display: none;">
            <div class="result-header d-flex justify-content-between align-items-center mb-3">
              <h4 class="font-orbitron text-success mb-0">LIVE INFERENCE</h4>
              <button class="btn btn-sm btn-outline-danger" onclick="resetApp()">Close Stream &times;</button>
            </div>
            
            <div class="inference-container">
              <img id="result-stream" class="img-fluid rounded border border-success" alt="Inference Stream will appear here">
            </div>

            <div class="mt-3">
               <button class="btn btn-outline-info btn-sm" onclick="downloadSnapshot()">Capture Snapshot 📷</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    "use strict";
    
    // Elements
    const dropzone = document.getElementById('upload-dropzone');
    const fileInput = document.getElementById('myfile');
    const fileLabel = document.getElementById('file-name-display');
    const processBtn = document.getElementById('process-btn');
    
    const stateUpload = document.getElementById('upload-state');
    const stateProcessing = document.getElementById('processing-state');
    const stateResult = document.getElementById('result-state');
    
    const resultStream = document.getElementById('result-stream');

    // Handle Drag & Drop styles
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.style.borderColor = '#0df';
      dropzone.style.backgroundColor = 'rgba(0, 221, 255, 0.1)';
    });

    dropzone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropzone.style.borderColor = 'var(--glass-border)';
      dropzone.style.backgroundColor = 'transparent';
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.style.borderColor = 'var(--glass-border)';
      dropzone.style.backgroundColor = 'transparent';
      
      if(e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        handleFileSelect({target: fileInput});
      }
    });

    // File selection handler
    function handleFileSelect(event) {
      let file = event.target.files[0];
      if (!file) return;

      fileLabel.innerText = "Selected: " + file.name;
      fileLabel.style.color = "#0df";
      processBtn.style.display = 'block';
    }

    // AJAX Form Submission
    async function submitAJAX() {
      if(!fileInput.files[0]) return;

      // Swap UI state
      stateUpload.style.display = 'none';
      stateProcessing.style.display = 'block';

      let formData = new FormData();
      formData.append('myfile', fileInput.files[0]);
      
      let modelType = document.getElementById('modelSelect').value;
      
      try {
        // Send file securely out of band
        const response = await fetch('/upload', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if(data.success) {
          // File uploaded! Now trigger stream without reloading the DOM.
          stateProcessing.style.display = 'none';
          stateResult.style.display = 'block';
          
          // Connect stream
          const streamUrl = '/predict?source=' + encodeURIComponent(data.source) + '&model_type=' + encodeURIComponent(modelType);
          resultStream.src = streamUrl;

        } else {
          alert("Server Error: " + (data.error || "Unknown"));
          resetApp();
        }
      } catch (err) {
        console.error(err);
        alert("Render Error: Upload timed out or failed. Free tier limit?");
        resetApp();
      }
    }

    // Allows users to take snapshot of the stream frame
    function downloadSnapshot() {
      const canvas = document.createElement('canvas');
      canvas.width = resultStream.naturalWidth || resultStream.width || 640;
      canvas.height = resultStream.naturalHeight || resultStream.height || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(resultStream, 0, 0);
      
      const link = document.createElement('a');
      link.download = 'NexVision_Snapshot.jpg';
      link.href = canvas.toDataURL('image/jpeg');
      link.click();
    }

    // Close & Reset
    function resetApp() {
      resultStream.src = ""; // Stop stream
      fileInput.value = "";
      fileLabel.innerText = "Drag and drop or click to select a file";
      fileLabel.style.color = "";
      processBtn.style.display = 'none';
      
      stateUpload.style.display = 'block';
      stateProcessing.style.display = 'none';
      stateResult.style.display = 'none';
    }

  </script>
</body>
</html>
